  <style>
    /* 貼近截圖的極簡深色風格 */
    body {
      background-color: #0d1117; /* 深色背景 */
      color: #c9d1d9; /* 淺灰文字 */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

      font-size: 2rem;
      margin-bottom: 20px;
    }

      font-size: 1rem;
    }

    .intro a {
      color: #58a6ff; /* 連結藍色 */
      text-decoration: none;
    }

    .intro a:hover {
      text-decoration: underline;
    }

    .nav-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    /* 模擬截圖中的橫線分隔效果 */
    .nav-list li {
      border-top: 1px solid #30363d;
      padding: 20px 0;
    }

    /* 確保最後一項也有底線，與截圖一致 */
    .nav-list li:last-child {
      border-bottom: 1px solid #30363d;
    }

    .nav-list a {
      color: #ffffff;
      text-decoration: none;
      font-size: 1.3rem;
      font-weight: bold;
      display: block; /* 讓整個區塊都可以點擊 */
      transition: color 0.2s;
    }

    .nav-list a:hover {
      color: #58a6ff;
    }
