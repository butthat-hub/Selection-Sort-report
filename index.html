<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>排序報告 - 索引導覽</title>
  <style>
    :root {
      --bg: #030712; --card: #111827; --primary: #3b82f6;
      --text: #f9fafb; --text-muted: #9ca3af; --border: #374151;
    }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { width: 100%; max-width: 800px; padding: 40px; }
    header { border-bottom: 1px solid var(--border); margin-bottom: 30px; padding-bottom: 20px; }
    h1 { font-size: 2.5rem; margin: 0; }
    .user-info { color: var(--text-muted); margin-top: 10px; display: flex; gap: 20px; }
    
    .nav-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
    .nav-item { 
      background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; 
      text-decoration: none; color: inherit; transition: all 0.2s; display: flex; align-items: center; justify-content: space-between;
    }
    .nav-item:hover { border-color: var(--primary); transform: translateY(-3px); background: #1f2937; }
    .nav-item h3 { margin: 0; font-size: 1.1rem; }
    .nav-item .arrow { color: var(--primary); font-weight: bold; }
    
    .section-label { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin: 30px 0 10px; }
  </style>
</head>
