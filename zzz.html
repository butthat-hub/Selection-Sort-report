<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>即時英文翻譯</title>

<style>
body{
    font-family: Arial, "Microsoft JhengHei";
    background:#f4f6fb;
    margin:0;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:16px;
    padding:25px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.buttons{
    text-align:center;
    margin-bottom:20px;
}

button{
    border:none;
    padding:12px 20px;
    margin:5px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

.start{ background:#4CAF50; color:white; }
.stop{ background:#f44336; color:white; }
.clear{ background:#666; color:white; }
.download{ background:#2196F3; color:white; }

.section{
    background:#eef2ff;
    padding:12px;
    border-radius:10px;
    min-height:50px;
    margin-bottom:16px;
    white-space:pre-wrap;
}

.record{
    border-bottom:1px solid #ddd;
    padding:5px 0;
}

.en{
    color:#444;
    margin-bottom:2px;
    line-height:1.35;
}

.zh{
    color:#000;
    font-weight:bold;
    line-height:1.35;
}

.status{
    text-align:center;
    margin-bottom:15px;
    font-weight:bold;
    color:#555;
}
</style>
</head>

<body>

<div class="container">

    <h1>英文音訊即時翻譯</h1>

    <div class="status" id="status">尚未開始</div>

    <div class="buttons">
        <button class="start" onclick="startRecognition()">開始翻譯</button>
        <button class="stop" onclick="stopRecognition()">停止翻譯</button>
        <button class="clear" onclick="clearRecords()">清除紀錄</button>
        <button class="download" onclick="downloadRecords()">下載紀錄</button>
    </div>

    <h3>目前英文：</h3>
    <div class="section" id="currentEnglish"></div>

    <h3>中文翻譯：</h3>
    <div class="section" id="currentChinese"></div>

    <h3>翻譯紀錄：</h3>
    <div class="section" id="records"></div>

</div>

<script>
let recognition;
let isRecognizing = false;
let manuallyStopped = false;
let records = [];
let lastFinalText = "";

function startRecognition(){

    if(isRecognizing) return;

    manuallyStopped = false;

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        alert("請使用 Chrome 或 Edge");
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;

    recognition.onstart = function(){
        isRecognizing = true;
        document.getElementById("status").innerText = "正在翻譯中...";
    };

    recognition.onresult = async function(event){

        let interimText = "";
        let finalText = "";

        for(let i = event.resultIndex; i < event.results.length; i++){

            let text = event.results[i][0].transcript.trim();

            if(event.results[i].isFinal){
                finalText += text + " ";
            }else{
                interimText += text + " ";
            }
        }

        finalText = finalText.trim();
        interimText = interimText.trim();

        document.getElementById("currentEnglish").innerText =
            interimText || finalText;

        if(finalText !== "" && finalText !== lastFinalText){

            lastFinalText = finalText;

            let chinese = await translateText(finalText);

            document.getElementById("currentChinese").innerText = chinese;

            records.push({
                english: finalText,
                chinese: chinese
            });

            updateRecords();
        }
    };

    recognition.onerror = function(event){

        console.log("語音辨識錯誤:", event.error);

        if(
            event.error === "aborted" ||
            event.error === "no-speech" ||
            event.error === "network"
        ){
            return;
        }

        if(event.error === "not-allowed"){
            alert("請允許麥克風權限");
            manuallyStopped = true;
            return;
        }

        console.log("已忽略錯誤:", event.error);
    };

    recognition.onend = function(){

        isRecognizing = false;

        if(manuallyStopped){
            document.getElementById("status").innerText = "已手動停止";
            return;
        }

        document.getElementById("status").innerText = "重新連接中...";

        setTimeout(()=>{
            if(!manuallyStopped){
                startRecognition();
            }
        }, 500);
    };

    try{
        recognition.start();
    }catch(error){
        console.log("啟動失敗，稍後重試", error);
    }
}

function stopRecognition(){

    manuallyStopped = true;

    if(recognition){
        recognition.stop();
    }

    isRecognizing = false;
    document.getElementById("status").innerText = "已手動停止";
}

async function translateText(text){

    try{
        const url =
        "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q="
        + encodeURIComponent(text);

        const response = await fetch(url);
        const data = await response.json();

        return data[0].map(item => item[0]).join("");

    }catch(error){
        return "翻譯失敗";
    }
}

function updateRecords(){

    const recordsDiv = document.getElementById("records");

    recordsDiv.innerHTML = "";

    records.forEach((item)=>{

        recordsDiv.innerHTML += `
        <div class="record">
            <div class="en">${item.english}</div>
            <div class="zh">${item.chinese}</div>
        </div>
        `;
    });
}

function clearRecords(){

    records = [];
    lastFinalText = "";

    updateRecords();

    document.getElementById("currentEnglish").innerText = "";
    document.getElementById("currentChinese").innerText = "";
}

function downloadRecords(){

    let text = "";

    records.forEach((item)=>{
        text += `${item.english}\n${item.chinese}\n\n`;
    });

    const blob = new Blob(
        [text],
        {type:"text/plain;charset=utf-8"}
    );

    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);
    a.download = "translation_records.txt";
    a.click();
}
</script>

</body>
</html>
