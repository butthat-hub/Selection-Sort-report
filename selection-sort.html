<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>選擇排序法演示</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 20px;
        }
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .array {
            display: flex;
            justify-content: center;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .element {
            width: 40px;
            height: 40px;
            line-height: 40px;
            text-align: center;
            margin: 0 5px 5px 0;
            border: 1px solid #333;
            border-radius: 5px;
            background-color: #f0f0f0;
        }
        .highlight {
            background-color: #ffcccb;
        }
        .min {
            background-color: #ffe58f;
        }
        .sorted {
            background-color: #d4edda;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        input[type=number] {
            width: 80px;
            padding: 8px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>選擇排序法演示</h1>
    <p>設定元素數量，然後按「生成陣列」開始。按「下一步」查看排序過程。</p>

    <div class="controls">
        <label for="count">元素數量：</label>
        <input id="count" type="number" min="2" max="20" value="7" />
        <button id="generate">生成陣列</button>
        <button id="next-step" disabled>下一步</button>
    </div>

    <div id="array-container" class="array">
        <!-- 動態生成數組元素 -->
    </div>

    <script>
        let array = [];
        let i = 0, j = 0, minIndex = 0;
        const container = document.getElementById('array-container');
        const nextStepButton = document.getElementById('next-step');
        const generateButton = document.getElementById('generate');
        const countInput = document.getElementById('count');

        function randomArray(count) {
            const result = [];
            for (let k = 0; k < count; k++) {
                result.push(Math.floor(Math.random() * 90) + 10);
            }
            return result;
        }

        function renderArray(highlightIndex = -1, highlightIndex2 = -1, minIdx = -1, sortedBoundary = -1) {
            container.innerHTML = '';
            array.forEach((value, index) => {
                const element = document.createElement('div');
                element.className = 'element';
                element.textContent = value;
                if (index === highlightIndex || index === highlightIndex2) {
                    element.classList.add('highlight');
                }
                if (index === minIdx) {
                    element.classList.add('min');
                }
                if (index < sortedBoundary) {
                    element.classList.add('sorted');
                }
                container.appendChild(element);
            });
        }

        function resetState() {
            i = 0;
            j = 1;
            minIndex = 0;
            nextStepButton.disabled = false;
        }

        function selectionSortStep() {
            if (i >= array.length - 1) {
                renderArray(-1, -1, -1, array.length);
                nextStepButton.disabled = true;
                alert('排序完成！');
                return;
            }

            // 在當前 i 位置尋找最小值
            if (j < array.length) {
                if (array[j] < array[minIndex]) {
                    minIndex = j;
                }
                renderArray(i, j, minIndex, i);
                j++;
            } else {
                // 將最小值放到 i 位置
                if (minIndex !== i) {
                    [array[i], array[minIndex]] = [array[minIndex], array[i]];
                }
                i++;
                minIndex = i;
                j = i + 1;
                renderArray(i, j, minIndex, i);
            }
        }

        function generateArray() {
            const count = parseInt(countInput.value, 10);
            if (Number.isNaN(count) || count < 2 || count > 20) {
                alert('請輸入 2~20 之間的元素數量。');
                return;
            }
            array = randomArray(count);
            resetState();
            renderArray(i, j, minIndex, 0);
        }

        generateButton.addEventListener('click', generateArray);
        nextStepButton.addEventListener('click', selectionSortStep);

        // 初次生成
        generateArray();
    </script>
</body>
</html>
